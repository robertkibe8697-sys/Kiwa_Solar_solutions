<!DOCTYPE html>
<html>
<head>
    <title>Contact - Kiwa Energy</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
    <nav>
        <h2 class="logo">KIWA ENERGY</h2>
        <ul>
            <li><a href="Kiwa_energy(home_page).html">HOME</a></li>
            <li><a href="Kiwa_energy(About_page).html">ABOUT</a></li>
            <li><a href="Kiwa_energy(Projects).html">Projects</a></li>
            <li><a href="Kiwa_energy(Servies_page).html">SERVICES</a></li>
            <li><a href="Kiwa_energy(Contacts).html">CONTACT</a></li>
            
        </ul>
    </nav>
</header>

<section class="page">
    <h1>Contact Us</h1>

    <p>📍 Nairobi, Kenya</p>
    <p>📞 +254 XXX XXX</p>
    <p>📧 info@kiwaenergy.com</p>

    <form>
        <input type="text" placeholder="Your Name" required><br><br>
        <input type="email" placeholder="Your Email" required><br><br>
        <textarea placeholder="Your Message" required></textarea><br><br>
        <button type="submit">Send Message</button>
    </form>

</section>
<script>
document.querySelector("form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = {
        name: document.querySelector("input[type='text']").value,
        email: document.querySelector("input[type='email']").value,
        message: document.querySelector("textarea").value
    };

    const res = await fetch("http://localhost:3000/contact", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    alert(await res.text());
});
</script>

</body>
</html>
