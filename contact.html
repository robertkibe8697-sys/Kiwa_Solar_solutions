<!DOCTYPE html>
<html>
<head>
    <title>Contact - Kiwa Energy</title>
    <link rel="stylesheet" href="styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<script>
  const toggle = document.getElementById("menu-toggle");
  const navLinks = document.getElementById("nav-links");

  toggle.addEventListener("click", () => {
    navLinks.classList.toggle("active");
  });
</script>

<body>

<header>
    <nav>
         <div class="logo-container">
    <img src="images/logo.png" alt="K&W Logo" class="logo">
    <p class="logo-text">Kiwa Energy Solutions</p>
</div>
        <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="about.html">ABOUT</a></li>
            <li><a href="projects.html">SERVICES</a></li>
            <li><a href="services.html">PROJECTS</a></li>
            <li><a href="contact.html">CONTACT</a></li>
            
        </ul>
    </nav>
</header>

<section class="page">
    <h1>Contact Us</h1>

    <p>📍 Nairobi, Kenya</p>
    <p>📞 +254 700 622889</p>
    <p>📧 info@kiwaenergy.com</p>

    <form>
        <input type="text" placeholder="Your Name" required><br><br>
        <input type="email" placeholder="Your Email" required><br><br>
        <textarea placeholder="Your Message" required></textarea><br><br>
        <button type="submit">Send Message</button>
    </form>

</section>
<script>
document.querySelector("form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = {
        name: document.querySelector("input[type='text']").value,
        email: document.querySelector("input[type='email']").value,
        message: document.querySelector("textarea").value
    };

    const res = await fetch("http://localhost:3000/contact", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    alert(await res.text());
});
</script>
<footer>
    <p>📍 Nairobi, Kenya</p>
    <p>📞 +254  700 622889</p>
    <p>© 2026 Kiwa Energy Solutions</p>
</footer>

</body>
</html>
